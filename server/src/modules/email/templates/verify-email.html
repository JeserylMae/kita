<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

  <style>
    body {
      line-height: 1rem;
      font-size: 1rem;
      font-weight: 500;
      font-family: 'Quicksand', sans-serif;
      display: flex; 
      justify-content: center; 
      width: 100vw;
      box-sizing: border-box;
      padding: 2.5rem;
      background-color: aliceblue;
    }
    p, ul {
      margin: 0.1rem;
      line-height: 2rem;
    }
    h1 {
      align-self: center;
      padding: 0rem;
      margin: 0px;
      line-height: 2.5rem;
      font-size: 2.5rem;
      font-weight: normal;
      font-family: 'Afacad', sans-serif;
    }
    h2 {
      padding: 0.5rem 0.5rem;
      margin: 0px;
      font-size: 2rem;
      font-family: 'Afacad', sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      padding: 1rem 1rem 0rem 1rem;
      justify-content: center;
      align-items: center;
    }
    .gradient-text {
      background-image: linear-gradient(to right, #29C474, #C4AE29);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
  </style>
</head>

<body>
  <div style="display: flex; 
              gap:1rem;
              flex-direction: column; 
              justify-content: center; 
              width: max-content;
              padding: 4rem;
              border-radius: 1rem;
              background-color: aliceblue;
              border: rgb(215, 215, 215) 1px solid;">

    <div style="display: flex; 
                flex-direction: row; 
                justify-content: center; 
                align-items: center;">
      <img alt="kita-logo" 
          width="32px" 
          height="32px" 
          src="https://res.cloudinary.com/dqztsogsu/image/upload/v1782315995/Kita_juwpa0.ico">

      <h2> KITA </h2>
    </div>

    <h1>
      Verify Your Email
    </h1>

    <div class="container">
      <p> You signed up in Kita using <strong>{{email}}</strong>.</p>
      <p>To complete your registration and activate your account:</p>
      
      <p style="margin: 1.5rem 0rem;">
        <a href="{{acceptURL}}" 
        style="text-decoration: none; 
          color: white; 
          padding: 0.7rem; 
          background-image: linear-gradient(to right, #29C474, #C4AE29); 
          border-radius: 0.2rem;">
          <strong>Verify Email</strong></a>
      </p>

      <p>This verification link will expire within <strong>24 hours</strong>.</p>
      <p>If you didn't create an account, you can safely ignore this email.</p>
    </div>
  </div>
</body> 
</html>
